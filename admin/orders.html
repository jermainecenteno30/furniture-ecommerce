<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — FURNI Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="admin-wrapper">

  <aside class="admin-sidebar">
    <div class="sidebar-logo"><span class="logo-icon">◈</span> FURNI <span style="font-size:.65rem; color:rgba(255,255,255,.4); margin-left:.5rem; font-family:var(--font-body); font-weight:400; letter-spacing:0">Admin</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="dashboard.html#products" class="admin-nav-link"><span class="nav-icon">🪑</span> Products</a>
      <a href="add-product.html" class="admin-nav-link"><span class="nav-icon">➕</span> Add Product</a>
      <a href="orders.html" class="admin-nav-link active"><span class="nav-icon">📦</span> Orders</a>
      <a href="users.html" class="admin-nav-link"><span class="nav-icon">👥</span> Users</a>
      <div style="border-top:1px solid rgba(255,255,255,.08); margin:.75rem 0"></div>
      <a href="../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer"><button onclick="adminLogout()">🚪 Logout</button></div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Orders</h1>
      <div class="admin-topbar-info" id="orderCount"></div>
    </div>

    <div class="admin-content">

      <!-- Order status summary -->
      <div class="stats-grid" style="margin-bottom:1.5rem">
        <div class="stat-card">
          <div class="stat-icon">🟡</div>
          <div>
            <div class="stat-label">Processing</div>
            <div class="stat-value" id="countProcessing">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔵</div>
          <div>
            <div class="stat-label">Shipped</div>
            <div class="stat-value" id="countShipped">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🟢</div>
          <div>
            <div class="stat-label">Delivered</div>
            <div class="stat-value" id="countDelivered">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div>
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="ordersRevenue">—</div>
          </div>
        </div>
      </div>

      <div class="admin-section">
        <div class="admin-section-header">
          <h2>All Orders</h2>
          <div style="display:flex; gap:.5rem; align-items:center">
            <input type="text" id="orderSearch" placeholder="Search by ID or customer…" style="width:220px; padding:.45rem .9rem; font-size:.85rem; border-radius:100px">
          </div>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Delivery Address</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr><td colspan="7" style="text-align:center; color:var(--text3); padding:2rem">Loading orders…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

</div>

<script src="../data/products.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Order status counts
    const orders = Storage.getOrders();
    const totalRevenue = orders.reduce((s, o) => s + o.total, 0);
    const setEl = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    setEl('countProcessing', orders.filter(o => o.status === 'Processing').length);
    setEl('countShipped',    orders.filter(o => o.status === 'Shipped').length);
    setEl('countDelivered',  orders.filter(o => o.status === 'Delivered').length);
    setEl('ordersRevenue', formatPrice(totalRevenue));

    // Live search filter
    const searchInput = document.getElementById('orderSearch');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase();
        const rows = document.querySelectorAll('#ordersBody tr');
        rows.forEach(row => {
          row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
      });
    }
  });
</script>
</body>
</html>
