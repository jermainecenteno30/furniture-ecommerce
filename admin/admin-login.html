<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — FURNI</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <div class="admin-login-page">
    <div class="auth-card admin-card" style="max-width:420px">
      <div class="auth-logo">
        <a href="../index.html" style="color:#fff"><span class="logo-icon">◈</span> FURNI</a>
      </div>

      <div class="admin-badge">
        🔐 <strong>Admin Portal</strong> — Restricted Access
      </div>

      <h1 class="auth-title" style="font-size:1.4rem">Admin Sign In</h1>
      <p class="auth-subtitle">Enter your admin credentials to continue</p>

      <div class="auth-error" id="adminError"></div>

      <form class="auth-form" id="adminLoginForm" novalidate>
        <div class="form-group">
          <label for="adminEmail">Admin Email</label>
          <input type="email" id="adminEmail" placeholder="admin@furni.com" required autocomplete="email" value="admin@furni.com">
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Admin password" required autocomplete="current-password" value="admin123">
        </div>
        <button type="submit" class="btn-primary btn-full" style="margin-top:.5rem">Sign In to Dashboard</button>
      </form>

      <div class="auth-footer" style="margin-top:1.25rem">
        <a href="../index.html">← Back to Store</a>
      </div>
    </div>
  </div>

  <script src="../data/products.js"></script>
  <script src="../js/storage.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
