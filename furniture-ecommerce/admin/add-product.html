<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — FURNI Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="admin-wrapper">

  <aside class="admin-sidebar">
    <div class="sidebar-logo"><span class="logo-icon">◈</span> FURNI <span style="font-size:.65rem; color:rgba(255,255,255,.4); margin-left:.5rem; font-family:var(--font-body); font-weight:400; letter-spacing:0">Admin</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="dashboard.html#products" class="admin-nav-link"><span class="nav-icon">🪑</span> Products</a>
      <a href="add-product.html" class="admin-nav-link active"><span class="nav-icon">➕</span> Add Product</a>
      <a href="orders.html" class="admin-nav-link"><span class="nav-icon">📦</span> Orders</a>
      <a href="users.html" class="admin-nav-link"><span class="nav-icon">👥</span> Users</a>
      <div style="border-top:1px solid rgba(255,255,255,.08); margin:.75rem 0"></div>
      <a href="../index.html" class="admin-nav-link"><span class="nav-icon">🏠</span> View Store</a>
    </nav>
    <div class="sidebar-footer"><button onclick="adminLogout()">🚪 Logout</button></div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Add New Product</h1>
      <a href="dashboard.html" class="btn-outline" style="padding:.4rem 1rem; font-size:.82rem">← Back to Dashboard</a>
    </div>

    <div class="admin-content">
      <div class="admin-section" style="max-width:720px">
        <div class="admin-section-header"><h2>Product Details</h2></div>
        <div style="padding:1.5rem">

          <form class="admin-form" id="productForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="pName">Product Name *</label>
                <input type="text" id="pName" placeholder="e.g. Nordic Wooden Chair" required>
              </div>
              <div class="form-group">
                <label for="pCategory">Category *</label>
                <select id="pCategory" required>
                  <option value="Chairs">Chairs</option>
                  <option value="Sofas">Sofas</option>
                  <option value="Tables">Tables</option>
                  <option value="Beds">Beds</option>
                  <option value="Storage">Storage</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="pPrice">Price (₱) *</label>
                <input type="number" id="pPrice" placeholder="e.g. 6800" min="0" step="0.01" required>
              </div>
              <div class="form-group">
                <label for="pStock">Stock Quantity *</label>
                <input type="number" id="pStock" placeholder="e.g. 10" min="0" required>
              </div>
            </div>

            <div class="form-group">
              <label for="pImage">Image URL *</label>
              <input type="url" id="pImage" placeholder="https://images.unsplash.com/..." required oninput="previewImage(this.value)">
              <div class="img-preview-wrap" id="imgPreview" style="margin-top:.75rem">
                <span style="color:var(--text3); font-size:.85rem">Image preview will appear here</span>
              </div>
            </div>

            <div class="form-group">
              <label for="pDescription">Description *</label>
              <textarea id="pDescription" placeholder="Describe the product — materials, dimensions, style..." required></textarea>
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="pFeatured">
                Mark as Featured (shown on Home page)
              </label>
            </div>

            <div style="display:flex; gap:1rem; margin-top:.5rem">
              <button type="submit" class="btn-primary">Save Product</button>
              <a href="dashboard.html" class="btn-secondary">Cancel</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>

</div>

<script src="../data/products.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/main.js"></script>
<script src="../js/admin.js"></script>
<script>
  function previewImage(url) {
    const wrap = document.getElementById('imgPreview');
    if (!url) { wrap.innerHTML = '<span style="color:var(--text3); font-size:.85rem">Image preview will appear here</span>'; return; }
    wrap.innerHTML = `<img src="${url}" alt="Preview" onerror="this.parentElement.innerHTML='<span style=color:var(--text3);font-size:.85rem>Invalid image URL</span>'">`;
  }
</script>
</body>
</html>
