<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — FURNI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div id="navbar-container"></div>

  <main>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="index.html"><span class="logo-icon">◈</span> FURNI</a>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Start your furniture journey today</p>

        <div class="auth-error" id="authError"></div>

        <form class="auth-form" id="signupForm" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Juan dela Cruz" required autocomplete="name">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="juan@email.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn-primary btn-full" style="margin-top:.5rem">Create Account</button>
        </form>

        <div class="auth-divider">or</div>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </main>

  <script src="data/products.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
